kind = "web"
previewPath = "/"
title = "Hari Kartini"
version = "1.0.0"
id = "artifacts/hari-kartini"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22424

[services.development]
run = "pnpm --filter @workspace/hari-kartini run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hari-kartini", "run", "build" ]
publicDir = "artifacts/hari-kartini/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22424"
BASE_PATH = "/"
